os: linux
dist: bionic

language: node_js
node_js:
    - "12"
addons:
    apt:
        packages:
            - exiftran
            - libimage-exiftool-perl
            - coreutils

services:
    - xvfb

script:
    - xvfb-run --server-args="-screen 0 1024x768x24" ./file-organizer.sh dump test/data
    - npm run test
    - npm run style
