os: linux
dist: bionic

language: node_js
node_js:
    - "12"
addons:
    apt:
        packages:
            - exiftran
            - libimage-exiftool-perl
            - coreutils

services:
    - xvfb

script:
    - chmod +x ./file-organizer.sh
    - ./file-organizer.sh dump test/data
    - xvfb-run ./file-organizer.sh dump test/data
    # - npm run test
    # - npm run style
