os: linux
dist: focal

# services:
#     - xvfb

language: node_js
node_js:
    - "14"
addons:
    apt:
        packages:
            - make
            - exiftran
            - libimage-exiftool-perl
            - coreutils

install:
    - make build

before-script:
    - xvfb-run ./file-organizer.sh dump test/data

script:
    - make test
    - make lint
